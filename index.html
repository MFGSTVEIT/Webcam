<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFG-St.Veit Infos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Stellt sicher, dass der Inhalt oben bleibt */
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            width: 100%;
        }

        .header img {
            max-height: 80px; /* Maximale Höhe des Logos */
            margin-right: 10px; /* Abstand zwischen Logo und Titel */
        }

        h1 {
            color: #333;  /* Dunkle Schriftfarbe für gute Lesbarkeit */
            font-size: 2.5em;
            text-align: center;
            text-transform: uppercase;  /* Setzt die Schrift in Großbuchstaben */
            letter-spacing: 2px;  /* Etwas mehr Abstand zwischen den Buchstaben */
        }

        img {
            max-width: 90%;
            height: auto;
            margin-top: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .info {
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 80%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        .info p {
            margin: 10px 0;
            font-size: 18px;
            color: #555;
        }

        /* Mobile Ansicht */
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;  /* Kleinere Schrift für mobile Geräte */
            }
            .info p {
                font-size: 16px;  /* Kleinere Schrift für den Text */
            }
            .header img {
                max-height: 50px; /* Kleinere Größe des Logos */
            }
        }

        /* Desktop-Ansicht */
        @media (min-width: 1024px) {
            h1 {
                font-size: 3em;  /* Größere Schrift für große Bildschirme */
            }
            .info p {
                font-size: 20px;  /* Größere Schrift für den Text */
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="Logo">
        <h1>MFG-St.Veit Infos</h1>
    </div>
    <div class="info">
        <p><strong>Batterie links:</strong> 12.56 V</p>
        <p><strong>Batterie rechts:</strong> 13.45 V</p>
        <p><strong>Innentemperatur:</strong> 22 Grad</p>
        <p><strong>Außentemperatur:</strong> 12 Grad</p>
    </div>
    <img src="webcam.jpg" alt="Webcam Bild">
</body>
</html>
